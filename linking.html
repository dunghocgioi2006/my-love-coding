<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư viện sách trực tuyến</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        
        header { text-align: center; margin-bottom: 30px; }
        header h1 { color: #333; }

        .search-bar { text-align: center; margin-bottom: 30px; }
        .search-bar input { width: 60%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        
        .filters { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .filters button { padding: 10px 20px; border: none; border-radius: 20px; background-color: #ddd; cursor: pointer; font-weight: bold; }
        .filters button.active, .filters button:hover { background-color: #5c67f2; color: white; }

        .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .book-card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; transition: transform 0.2s; }
        .book-card:hover { transform: translateY(-5px); }
        .book-card img { width: 100%; height: 250px; object-fit: cover; border-radius: 5px; margin-bottom: 10px; }
        .book-card h3 { font-size: 18px; color: #333; margin-bottom: 5px; }
        .book-card p { font-size: 14px; color: #777; margin-bottom: 15px; }
        .book-card a { text-decoration: none; background-color: #5c67f2; color: white; padding: 10px 15px; border-radius: 5px; display: inline-block; font-size: 14px; }
        .book-card a:hover { background-color: #4a54e1; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📚 Thư viện sách của tôi</h1>
    </header>

    <div class="search-bar">
        <input type="text" placeholder="Tìm kiếm tên sách, tác giả...">
    </div>

    <div class="filters">
        <button class="active">Tất cả</button>
        <button>Văn học</button>
        <button>Kinh doanh</button>
        <button>Công nghệ</button>
    </div>

    <div class="book-grid">
        <!-- Cuốn sách 1 -->
        <div class="book-card">
            <img src="https://unsplash.com" alt="Bìa sách">
            <h3>Nhà Giả Kim</h3>
            <p>Paulo Coelho</p>
            <a href="#">Đọc sách</a>
        </div>
        <!-- Cuốn sách 2 -->
        <div class="book-card">
            <img src="https://unsplash.com" alt="Bìa sách">
            <h3>Đắc Nhân Tâm</h3>
            <p>Dale Carnegie</p>
            <a href="#">Đọc sách</a>
        </div>
        <!-- Cuốn sách 3 -->
        <div class="book-card">
            <img src="https://unsplash.com" alt="Bìa sách">
            <h3>Tuổi Trẻ Đáng Giá Bao Nhiêu</h3>
            <p>Rosie Nguyễn</p>
            <a href="#">Đọc sách</a>
        </div>
        <!-- Cuốn sách 4 -->
        <div class="book-card">
            <img src="https://unsplash.com" alt="Bìa sách">
            <h3>Sapiens: Lược sử loài người</h3>
            <p>Yuval Noah Harari</p>
            <a href="#">Đọc sách</a>
        </div>
    </div>
</div>

</body>
</html>
